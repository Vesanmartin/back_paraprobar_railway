version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Nenas.2120
      MYSQL_DATABASE: grupocordillera
    volumes:
      - mysql_data:/var/lib/mysql
<<<<<<< HEAD
      - ./sql-init:/docker-entrypoint-initdb.d
=======
      - ./init-db:/docker-entrypoint-initdb.d
>>>>>>> origin/natalie-dev
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pNenas.2120"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  auth-service:
    build: ./auth-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: Nenas.2120
      DB_NAME: grupocordillera
      JWT_SECRET: supersecreto123
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  importacion-service:
    build: ./importacion-service
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: Nenas.2120
      DB_NAME: grupocordillera
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  kpi-service:
    build: ./kpi-service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: Nenas.2120
      DB_NAME: grupocordillera
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  informes-service:
    build: ./informes-service
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: Nenas.2120
      DB_NAME: grupocordillera
      KPI_SERVICE_URL: http://kpi-service:3002
      GESTION_SERVICE_URL: http://gestion-service:3006
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kpi-service:
        condition: service_started
    restart: on-failure

  bff:
    build: ./bff
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
    depends_on:
      auth-service:
        condition: service_started
      kpi-service:
        condition: service_started
      informes-service:
        condition: service_started
    restart: on-failure

  gestion-service:
    build: ./gestion-service
    ports:
      - "3006:3006"
    environment:
      PORT: 3006
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: Nenas.2120
      DB_NAME: grupocordillera
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  api-gateway:
    build: ./api-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
    depends_on:
      auth-service:
        condition: service_started
      kpi-service:
        condition: service_started
      informes-service:
        condition: service_started
      importacion-service:
        condition: service_started
      gestion-service:
        condition: service_started
      bff:
        condition: service_started
    restart: on-failure

volumes:
  mysql_data: