# docker-compose.yml
version: '3.8'

services:

  kpi-service:
    build: ./kpi-service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
    restart: on-failure

  informes-service:
    build: ./informes-service
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      KPI_SERVICE_URL: http://kpi-service:3002
      GESTION_SERVICE_URL: http://gestion-service:3003
    depends_on:
      - kpi-service
    restart: on-failure